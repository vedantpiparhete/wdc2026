<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Introduction</title>
<style>
    /* Multicolor background for the page */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #ff9a9e 50%, #fecfef 100%);
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* White container box */
    .profile-card {
        background-color: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 350px;
        text-align: center;
    }

    .profile-card h2 {
        margin-top: 0;
        color: #333;
    }

    .info-item {
        text-align: left;
        margin: 15px 0;
        font-size: 16px;
        color: #555;
    }

    .info-item strong {
        color: #000;
        display: block;
        margin-bottom: 3px;
    }

    /* Submit Button Styling */
    .submit-btn {
        background: linear-gradient(to right, #667eea, #764ba2);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        width: 100%;
        margin-top: 20px;
        transition: opacity 0.3s;
    }

    .submit-btn:hover {
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="profile-card">
    <h2>Personal Info</h2>
    
    <div class="info-item">
        <strong>Name:</strong> John Doe
    </div>
    <div class="info-item">
        <strong>Age:</strong> 22
    </div>
    <div class="info-item">
        <strong>Gender:</strong> Male
    </div>
    <div class="info-item">
        <strong>Institute Name:</strong> City Technical College
    </div>
    <div class="info-item">
        <strong>Class:</strong> Computer Science - Year 3
    </div>

    <button class="submit-btn" type="submit">Submit</button>
</div>

</body>
</html>
